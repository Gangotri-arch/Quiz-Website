<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Art & Culture Quiz</title>

<script>
let lang = localStorage.getItem("lang") || "en";
</script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
}

/* LAYOUT */
.wrapper{
    display:flex;
    gap:20px;
    padding:20px;
    justify-content:center;
}

/* QUIZ BOX */
.quiz-box{
    width:100%;
    max-width:750px;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* SIDE PANEL */
.side-panel{
    width:220px;
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    height:fit-content;
}

.qbtn{
    width:40px;
    height:40px;
    margin:5px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.not-attempted{ background:#ccc; }
.answered{ background:#28a745; color:white; }
.reviewed{ background:#ff9800; color:white; }

/* TEXT */
h1{
    text-align:center;
    color:#007bff;
}

#timer{
    text-align:center;
    font-size:22px;
    color:red;
    font-weight:bold;
    margin:10px 0;
}

#question{
    font-size:22px;
    margin-bottom:15px;
}

.option{
    background:#e9ecef;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    cursor:pointer;
}

.option:hover{
    background:#007bff;
    color:white;
}

.selected{
    background:#28a745 !important;
    color:white;
}

/* BUTTONS */
.buttons{
    display:flex;
    gap:10px;
    margin-top:15px;
}

button{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
}

#prevBtn{background:#6c757d;}
#nextBtn{background:#007bff;}
#reviewBtn{background:#ff9800;}
#submitBtn{background:#28a745;}

/* LANGUAGE BUTTON */
#langBtn{
    position:fixed;
    top:20px;
    left:20px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#222;
    color:white;
    z-index:999;
}

/* RESULT */
#result{
    margin-top:20px;
    text-align:center;
}

</style>
</head>

<body>

<!-- LANGUAGE BUTTON -->
<button id="langBtn" onclick="toggleLanguage()">हिन्दी</button>

<div class="wrapper">

<!-- QUIZ -->
<div class="quiz-box">

<h1 id="title">Art & Culture Quiz</h1>

<div id="timer">⏳ 10:00</div>

<h3 id="questionNumber"></h3>

<div id="question"></div>

<div id="options"></div>

<div class="buttons">

<button id="prevBtn">Previous</button>
<button id="nextBtn">Next</button>
<button id="reviewBtn">Mark Review</button>
<button id="submitBtn">Submit</button>

</div>

<div id="result"></div>

</div>

<!-- SIDE PANEL -->
<div class="side-panel">
<h3>Question Board</h3>
<div id="palette"></div>
</div>

</div>

<script>

/* LANGUAGE */
function toggleLanguage(){

    lang = (lang === "en") ? "hi" : "en";
    localStorage.setItem("lang", lang);

    applyLanguage();
    loadQ();
}

function applyLanguage(){

    document.getElementById("langBtn").innerText =
    (lang === "hi") ? "English" : "हिन्दी";

    document.getElementById("title").innerText =
    (lang === "hi") ? "कला और संस्कृति क्विज" : "Art & Culture Quiz";

    document.getElementById("prevBtn").innerText =
    (lang === "hi") ? "पिछला" : "Previous";

    document.getElementById("nextBtn").innerText =
    (lang === "hi") ? "अगला" : "Next";

    document.getElementById("reviewBtn").innerText =
    (lang === "hi") ? "रिव्यू" : "Mark Review";

    document.getElementById("submitBtn").innerText =
    (lang === "hi") ? "सबमिट" : "Submit";
}

/* QUIZ DATA (BILINGUAL) */
const quizData = [
{
q_en:"Who wrote Vande Mataram?",
q_hi:"वंदे मातरम् किसने लिखा?",
o_en:["A Bankim","B Tagore","C Premchand","D Kalidas"],
o_hi:["A बंकिम","B टैगोर","C प्रेमचंद","D कालिदास"],
a:"A Bankim"
},
{
q_en:"Kathak is?",
q_hi:"कत्थक क्या है?",
o_en:["A Painting","B Music","C Dance","D Drama"],
o_hi:["A चित्रकला","B संगीत","C नृत्य","D नाटक"],
a:"C Dance"
},
{
q_en:"Bharatanatyam belongs to?",
q_hi:"भरतनाट्यम किससे संबंधित है?",
o_en:["A Kerala","B Tamil Nadu","C Punjab","D Rajasthan"],
o_hi:["A केरल","B तमिलनाडु","C पंजाब","D राजस्थान"],
a:"B Tamil Nadu"
}
];

let index = 0;
let answers = new Array(quizData.length).fill(null);
let review = new Array(quizData.length).fill(false);

const qno = document.getElementById("questionNumber");
const question = document.getElementById("question");
const options = document.getElementById("options");
const palette = document.getElementById("palette");
const result = document.getElementById("result");

/* LOAD QUESTION */
function loadQ(){

    let q = quizData[index];

    qno.innerText = `Question ${index+1}/${quizData.length}`;

    question.innerText =
    (lang === "hi") ? q.q_hi : q.q_en;

    options.innerHTML = "";

    let optList = (lang === "hi") ? q.o_hi : q.o_en;

    optList.forEach(opt=>{

        let div = document.createElement("div");
        div.className = "option";

        if(answers[index] === opt){
            div.classList.add("selected");
        }

        div.innerText = opt;

        div.onclick = ()=>{
            answers[index] = opt;
            updatePalette();
            loadQ();
        };

        options.appendChild(div);
    });

    updatePalette();
}

/* PALETTE */
function updatePalette(){

    palette.innerHTML = "";

    quizData.forEach((_,i)=>{

        let btn = document.createElement("button");
        btn.className = "qbtn";

        if(review[i]) btn.classList.add("reviewed");
        else if(answers[i]) btn.classList.add("answered");
        else btn.classList.add("not-attempted");

        btn.innerText = i+1;

        btn.onclick = ()=>{
            index = i;
            loadQ();
        };

        palette.appendChild(btn);
    });
}

/* NAV */
document.getElementById("nextBtn").onclick = ()=>{
    if(index < quizData.length-1){
        index++;
        loadQ();
    }
};

document.getElementById("prevBtn").onclick = ()=>{
    if(index > 0){
        index--;
        loadQ();
    }
};

document.getElementById("reviewBtn").onclick = ()=>{
    review[index] = true;
    updatePalette();
};

/* RESULT */
function showResult(){

    clearInterval(timer);

    let score = 0;
    let html = "";

    quizData.forEach((q,i)=>{

        let u = answers[i];
        let c = q.a;

        let status = "";

        if(u === null){
            status = "⚪ Not Attempted";
        }
        else if(u === c){
            score++;
            status = "✅ Correct";
        }
        else{
            status = "❌ Wrong";
        }

        html += `
        <div style="margin:10px;padding:10px;border:1px solid #ccc;text-align:left;">
            <h3>Q${i+1}. ${lang === "hi" ? q.q_hi : q.q_en}</h3>
            <p>Your: ${u || "Not Attempted"}</p>
            <p>Correct: ${c}</p>
            <p>${status}</p>
        </div>`;
    });

    document.querySelector(".side-panel").style.display="none";
    document.querySelector(".buttons").style.display="none";
    document.getElementById("options").style.display="none";
    document.getElementById("timer").style.display="none";
    document.getElementById("questionNumber").style.display="none";
    document.getElementById("question").style.display="none";

    result.innerHTML =
    `<h2>Score: ${score}/${quizData.length}</h2>` + html;
}

document.getElementById("submitBtn").onclick = showResult;

/* TIMER */
let timeLeft = 600;

const timer = setInterval(()=>{

    let m = Math.floor(timeLeft/60);
    let s = timeLeft%60;

    if(s<10) s="0"+s;

    document.getElementById("timer").innerText =
    `⏳ ${m}:${s}`;

    timeLeft--;

    if(timeLeft < 0){
        showResult();
    }

},1000);

/* START */
applyLanguage();
loadQ();

</script>

</body>
</html>
