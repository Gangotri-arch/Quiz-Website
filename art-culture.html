<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Art & Culture Quiz</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.quiz-box{
    width:100%;
    max-width:750px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:10px;
    color:#007bff;
}

/* Timer */
#timer{
    text-align:center;
    font-size:22px;
    color:red;
    margin-bottom:15px;
    font-weight:bold;
}

/* Question */
#questionNumber{
    margin-bottom:10px;
    font-size:16px;
    color:#555;
}

#question{
    font-size:22px;
    margin-bottom:20px;
}

/* Options */
.option{
    background:#e9ecef;
    padding:12px;
    margin-bottom:12px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.option:hover{
    background:#007bff;
    color:white;
}

.selected{
    background:#28a745 !important;
    color:white;
}

.review{
    border:2px solid orange;
}

/* Buttons */
.buttons{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:20px;
}

.buttons button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
    font-size:15px;
}

#prevBtn{background:#6c757d;}
#nextBtn{background:#007bff;}
#reviewBtn{background:#ff9800;}
#submitBtn{background:#28a745;}

/* Result */
#result{
    margin-top:20px;
    text-align:center;
    font-size:20px;
    color:#007bff;
}

</style>
</head>

<body>

<div class="quiz-box">

<h1>Art & Culture Quiz</h1>

<div id="timer">⏳ Time Left: 10:00</div>

<div id="questionNumber"></div>

<div id="question"></div>

<div id="options"></div>

<div class="buttons">

<button id="prevBtn">Previous</button>
<button id="nextBtn">Next</button>
<button id="reviewBtn">Mark For Review</button>
<button id="submitBtn">Submit</button>

</div>

<div id="result"></div>

</div>

<script>

/* Questions */
const quizData = [
{
question:"Who wrote Vande Mataram?",
options:["A. Bankim Chandra Chattopadhyay","B. Rabindranath Tagore","C. Premchand","D. Kalidas"],
answer:"A. Bankim Chandra Chattopadhyay"
},
{
question:"Kathak is a famous form of?",
options:["A. Painting","B. Music","C. Dance","D. Drama"],
answer:"C. Dance"
},
{
question:"Bharatanatyam originated in which state?",
options:["A. Kerala","B. Tamil Nadu","C. Punjab","D. Rajasthan"],
answer:"B. Tamil Nadu"
}
];

/* Variables */
let currentQuestion = 0;
let userAnswers = new Array(quizData.length).fill(null);
let markedReview = new Array(quizData.length).fill(false);

const questionNumber = document.getElementById("questionNumber");
const question = document.getElementById("question");
const options = document.getElementById("options");
const result = document.getElementById("result");
const timerEl = document.getElementById("timer");

/* Load Question */
function loadQuestion(){

    let q = quizData[currentQuestion];

    questionNumber.innerText =
    `Question ${currentQuestion+1} of ${quizData.length}`;

    question.innerText = q.question;

    options.innerHTML = "";

    q.options.forEach(option => {

        let div = document.createElement("div");
        div.classList.add("option");
        div.innerText = option;

        if(userAnswers[currentQuestion] === option){
            div.classList.add("selected");
        }

        if(markedReview[currentQuestion]){
            div.classList.add("review");
        }

        div.onclick = () => {
            userAnswers[currentQuestion] = option;
            loadQuestion();
        };

        options.appendChild(div);
    });
}

/* Navigation */
document.getElementById("nextBtn").onclick = () => {
    if(currentQuestion < quizData.length - 1){
        currentQuestion++;
        loadQuestion();
    }
};

document.getElementById("prevBtn").onclick = () => {
    if(currentQuestion > 0){
        currentQuestion--;
        loadQuestion();
    }
};

document.getElementById("reviewBtn").onclick = () => {
    markedReview[currentQuestion] = true;
    loadQuestion();
};

/* FINAL RESULT FUNCTION */
function showResult(){

    clearInterval(countdown);

    let score = 0;
    let reviewHTML = "";

    quizData.forEach((q,index) => {

        let userAns = userAnswers[index];
        let correctAns = q.answer;

        let status = "";

        if(userAns === correctAns){
            score++;
            status = "✅ Correct";
        } else {
            status = "❌ Wrong";
        }

        reviewHTML += `
        <div style="margin-top:15px;padding:10px;border:1px solid #ddd;border-radius:8px;text-align:left;">
            <h3>Q${index+1}. ${q.question}</h3>
            <p><b>Your Answer:</b> ${userAns || "Not Attempted"}</p>
            <p><b>Correct Answer:</b> ${correctAns}</p>
            <p>${status}</p>
        </div>
        `;
    });

    document.querySelector(".buttons").style.display = "none";
    question.style.display = "none";
    options.style.display = "none";
    questionNumber.style.display = "none";
    timerEl.style.display = "none";

    result.innerHTML = `
    <h2>Your Score: ${score} / ${quizData.length}</h2>
    ${reviewHTML}
    `;
}

/* Submit */
document.getElementById("submitBtn").onclick = showResult;

/* TIMER */
let timeLeft = 600;

const countdown = setInterval(() => {

    let min = Math.floor(timeLeft / 60);
    let sec = timeLeft % 60;

    if(sec < 10) sec = "0" + sec;

    timerEl.innerText = `⏳ Time Left: ${min}:${sec}`;

    timeLeft--;

    if(timeLeft < 0){
        showResult();
    }

},1000);

/* START */
loadQuestion();

</script>

</body>
</html>
