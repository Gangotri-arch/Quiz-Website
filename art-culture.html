<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Art & Culture Quiz</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
}

/* LAYOUT */
.wrapper{
    display:flex;
    gap:20px;
    padding:20px;
    justify-content:center;
}

/* QUIZ BOX */
.quiz-box{
    width:100%;
    max-width:750px;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* SIDE PANEL */
.side-panel{
    width:220px;
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    height:fit-content;
}

.qbtn{
    width:40px;
    height:40px;
    margin:5px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

/* COLORS */
.not-attempted{ background:#ccc; }
.answered{ background:#28a745; color:white; }
.reviewed{ background:#ff9800; color:white; }

/* TEXT */
h1{ text-align:center; color:#007bff; }

#timer{
    text-align:center;
    font-size:22px;
    color:red;
    font-weight:bold;
    margin:10px 0;
}

#questionNumber{
    color:#555;
    margin-bottom:10px;
}

#question{
    font-size:22px;
    margin-bottom:15px;
}

/* OPTIONS */
.option{
    background:#e9ecef;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    cursor:pointer;
}

.option:hover{
    background:#007bff;
    color:white;
}

.selected{
    background:#28a745 !important;
    color:white;
}

/* BUTTONS */
.buttons{
    display:flex;
    gap:10px;
    margin-top:15px;
}

button{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
}

#prevBtn{background:#6c757d;}
#nextBtn{background:#007bff;}
#reviewBtn{background:#ff9800;}
#submitBtn{background:#28a745;}

/* RESULT */
#result{
    margin-top:20px;
    text-align:center;
}

</style>
</head>

<body>

<div class="wrapper">

<!-- QUIZ -->
<div class="quiz-box">

<h1>Art & Culture Quiz</h1>

<div id="timer">⏳ 10:00</div>

<h3 id="questionNumber"></h3>

<div id="question"></div>

<div id="options"></div>

<div class="buttons">

<button id="prevBtn">Previous</button>
<button id="nextBtn">Next</button>
<button id="reviewBtn">Mark Review</button>
<button id="submitBtn">Submit</button>

</div>

<div id="result"></div>

</div>

<!-- SIDE PANEL -->
<div class="side-panel">
<h3>Question Board</h3>
<div id="palette"></div>
</div>

</div>

<script>

/* QUESTIONS */
const quizData = [
{
q:"Who wrote Vande Mataram?",
o:["A Bankim","B Tagore","C Premchand","D Kalidas"],
a:"A Bankim"
},
{
q:"Kathak is?",
o:["A Painting","B Music","C Dance","D Drama"],
a:"C Dance"
},
{
q:"Bharatanatyam belongs to?",
o:["A Kerala","B Tamil Nadu","C Punjab","D Rajasthan"],
a:"B Tamil Nadu"
}
];

/* VARIABLES */
let index = 0;
let answers = new Array(quizData.length).fill(null);
let review = new Array(quizData.length).fill(false);

const qno = document.getElementById("questionNumber");
const question = document.getElementById("question");
const options = document.getElementById("options");
const palette = document.getElementById("palette");
const result = document.getElementById("result");
const timerEl = document.getElementById("timer");

/* LOAD QUESTION */
function loadQ(){

    let q = quizData[index];

    qno.innerText = `Question ${index+1}/${quizData.length}`;
    question.innerText = q.q;

    options.innerHTML = "";

    q.o.forEach(opt=>{

        let div = document.createElement("div");
        div.className = "option";

        if(answers[index] === opt){
            div.classList.add("selected");
        }

        div.innerText = opt;

        div.onclick = ()=>{
            answers[index] = opt;
            updatePalette();
            loadQ();
        };

        options.appendChild(div);
    });

    updatePalette();
}

/* PALETTE */
function updatePalette(){

    palette.innerHTML = "";

    quizData.forEach((_,i)=>{

        let btn = document.createElement("button");
        btn.className = "qbtn";

        if(review[i]){
            btn.classList.add("reviewed");
        }
        else if(answers[i]){
            btn.classList.add("answered");
        }
        else{
            btn.classList.add("not-attempted");
        }

        btn.innerText = i+1;

        btn.onclick = ()=>{
            index = i;
            loadQ();
        };

        palette.appendChild(btn);
    });
}

/* NAV */
document.getElementById("nextBtn").onclick = ()=>{
    if(index < quizData.length-1){
        index++;
        loadQ();
    }
};

document.getElementById("prevBtn").onclick = ()=>{
    if(index > 0){
        index--;
        loadQ();
    }
};

document.getElementById("reviewBtn").onclick = ()=>{
    review[index] = true;
    updatePalette();
};

/* FINAL RESULT */
function showResult(){

    clearInterval(timer);

    let score = 0;
    let reviewHTML = "";

    quizData.forEach((q,i)=>{

        let userAns = answers[i];
        let correctAns = q.a;

        let status = "";

        if(userAns === null){
            status = "⚪ Not Attempted";
        }
        else if(userAns === correctAns){
            score++;
            status = "✅ Correct";
        }
        else{
            status = "❌ Wrong";
        }

        reviewHTML += `
        <div style="text-align:left;margin:10px 0;padding:10px;border:1px solid #ccc;border-radius:8px;">
            <h3>Q${i+1}. ${q.q}</h3>
            <p><b>Your Answer:</b> ${userAns || "Not Attempted"}</p>
            <p><b>Correct Answer:</b> ${correctAns}</p>
            <p>${status}</p>
        </div>
        `;
    });

    document.querySelector(".buttons").style.display = "none";
    document.querySelector(".side-panel").style.display = "none";
    question.style.display = "none";
    options.style.display = "none";
    qno.style.display = "none";
    timerEl.style.display = "none";

    result.innerHTML = `
        <h2>Final Score: ${score}/${quizData.length}</h2>
        ${reviewHTML}
    `;
}

document.getElementById("submitBtn").onclick = showResult;

/* TIMER */
let timeLeft = 600;

const timer = setInterval(()=>{

    let m = Math.floor(timeLeft/60);
    let s = timeLeft%60;

    if(s<10) s="0"+s;

    timerEl.innerText = `⏳ ${m}:${s}`;

    timeLeft--;

    if(timeLeft < 0){
        showResult();
    }

},1000);

/* START */
loadQ();

</script>

</body>
</html>
