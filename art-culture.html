<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Art & Culture Quiz</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.quiz-box{
    width:100%;
    max-width:700px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#007bff;
}

#questionNumber{
    margin-bottom:10px;
    font-size:18px;
    color:#555;
}

#question{
    font-size:24px;
    margin-bottom:25px;
}

.option{
    background:#e9ecef;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
    font-size:18px;
}

.option:hover{
    background:#007bff;
    color:white;
}

.selected{
    background:#28a745 !important;
    color:white;
}

.review{
    border:3px solid orange;
}

.buttons{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    margin-top:25px;
}

.buttons button{
    flex:1;
    padding:14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:17px;
    color:white;
}

#prevBtn{
    background:#6c757d;
}

#nextBtn{
    background:#007bff;
}

#reviewBtn{
    background:#ff9800;
}

#submitBtn{
    background:#28a745;
}

#result{
    margin-top:25px;
    text-align:center;
    font-size:24px;
    color:#007bff;
}

</style>
</head>

<body>

<div class="quiz-box">

<h1>Art & Culture Quiz</h1>

<div id="questionNumber"></div>

<div id="question"></div>

<div id="options"></div>

<div class="buttons">

<button id="prevBtn">Previous</button>

<button id="nextBtn">Next</button>

<button id="reviewBtn">Mark For Review</button>

<button id="submitBtn">Submit</button>

</div>

<div id="result"></div>

</div>

<script>

const quizData = [

{
question:"Who wrote Vande Mataram?",
options:[
"A. Bankim Chandra Chattopadhyay",
"B. Rabindranath Tagore",
"C. Premchand",
"D. Kalidas"
],
answer:"A. Bankim Chandra Chattopadhyay"
},

{
question:"Kathak is a famous form of?",
options:[
"A. Painting",
"B. Music",
"C. Dance",
"D. Drama"
],
answer:"C. Dance"
},

{
question:"Bharatanatyam originated in which state?",
options:[
"A. Kerala",
"B. Tamil Nadu",
"C. Punjab",
"D. Rajasthan"
],
answer:"B. Tamil Nadu"
}

];

let currentQuestion = 0;

let userAnswers = new Array(quizData.length).fill(null);

let markedReview = new Array(quizData.length).fill(false);

const questionNumber =
document.getElementById("questionNumber");

const question =
document.getElementById("question");

const options =
document.getElementById("options");

const result =
document.getElementById("result");

function loadQuestion(){

    let q = quizData[currentQuestion];

    questionNumber.innerText =
    "Question " + (currentQuestion + 1) +
    " of " + quizData.length;

    question.innerText = q.question;

    options.innerHTML = "";

    q.options.forEach(option => {

        let div = document.createElement("div");

        div.classList.add("option");

        div.innerText = option;

        if(userAnswers[currentQuestion] === option){
            div.classList.add("selected");
        }

        if(markedReview[currentQuestion]){
            div.classList.add("review");
        }

        div.onclick = () => {

            userAnswers[currentQuestion] = option;

            loadQuestion();
        };

        options.appendChild(div);

    });

}

document.getElementById("nextBtn")
.onclick = () => {

    if(currentQuestion < quizData.length - 1){

        currentQuestion++;

        loadQuestion();
    }

};

document.getElementById("prevBtn")
.onclick = () => {

    if(currentQuestion > 0){

        currentQuestion--;

        loadQuestion();
    }

};

document.getElementById("reviewBtn")
.onclick = () => {

    markedReview[currentQuestion] = true;

    loadQuestion();
};

document.getElementById("submitBtn")
.onclick = () => {

    let score = 0;

    quizData.forEach((q,index) => {

        if(userAnswers[index] === q.answer){

            score++;
        }

    });

    result.innerText =
    "Your Score: " + score +
    " / " + quizData.length;
};

loadQuestion();

</script>

</body>
</html>
