<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Art & Culture Quiz</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
}

/* MAIN LAYOUT */
.wrapper{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:20px;
}

/* QUIZ BOX */
.quiz-box{
    width:100%;
    max-width:700px;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* SIDE PANEL */
.side-panel{
    width:200px;
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    height:fit-content;
}

.qbtn{
    width:40px;
    height:40px;
    margin:5px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

/* COLORS */
.not-answered{ background:#ccc; }
.answered{ background:#28a745; color:white; }
.reviewed{ background:#ff9800; color:white; }

h1{
    text-align:center;
    color:#007bff;
}

#timer{
    text-align:center;
    font-size:20px;
    color:red;
    font-weight:bold;
    margin:10px 0;
}

.option{
    background:#e9ecef;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    cursor:pointer;
}

.selected{
    background:#28a745 !important;
    color:white;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:15px;
}

button{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
}

#prevBtn{background:#6c757d;}
#nextBtn{background:#007bff;}
#reviewBtn{background:#ff9800;}
#submitBtn{background:#28a745;}

#result{
    margin-top:15px;
    text-align:center;
}

</style>
</head>

<body>

<div class="wrapper">

<!-- QUIZ AREA -->
<div class="quiz-box">

<h1>Art & Culture Quiz</h1>

<div id="timer">⏳ 10:00</div>

<h3 id="qno"></h3>

<div id="question"></div>

<div id="options"></div>

<div class="buttons">

<button id="prevBtn">Prev</button>
<button id="nextBtn">Next</button>
<button id="reviewBtn">Mark</button>
<button id="submitBtn">Submit</button>

</div>

<div id="result"></div>

</div>

<!-- SIDE PANEL -->
<div class="side-panel">
<h3>Question Palette</h3>
<div id="palette"></div>
</div>

</div>

<script>

const quizData = [
{q:"Who wrote Vande Mataram?",o:["A Bankim","B Tagore","C Premchand","D Kalidas"],a:"A Bankim"},
{q:"Kathak is?",o:["A Painting","B Music","C Dance","D Drama"],a:"C Dance"},
{q:"Bharatanatyam belongs to?",o:["A Kerala","B Tamil Nadu","C Punjab","D Rajasthan"],a:"B Tamil Nadu"}
];

let index = 0;
let answers = new Array(quizData.length).fill(null);
let review = new Array(quizData.length).fill(false);

const qno = document.getElementById("qno");
const question = document.getElementById("question");
const options = document.getElementById("options");
const palette = document.getElementById("palette");
const result = document.getElementById("result");

/* LOAD QUESTION */
function loadQ(){

    let q = quizData[index];

    qno.innerText = `Question ${index+1}/${quizData.length}`;
    question.innerText = q.q;

    options.innerHTML = "";

    q.o.forEach(opt => {

        let div = document.createElement("div");
        div.className = "option";

        if(answers[index] === opt){
            div.classList.add("selected");
        }

        div.innerText = opt;

        div.onclick = () => {
            answers[index] = opt;
            updatePalette();
            loadQ();
        };

        options.appendChild(div);
    });

    updatePalette();
}

/* QUESTION BOARD */
function updatePalette(){

    palette.innerHTML = "";

    quizData.forEach((_,i)=>{

        let btn = document.createElement("button");
        btn.className = "qbtn";

        if(review[i]){
            btn.classList.add("reviewed");
        }
        else if(answers[i]){
            btn.classList.add("answered");
        }
        else{
            btn.classList.add("not-answered");
        }

        btn.innerText = i+1;

        btn.onclick = () => {
            index = i;
            loadQ();
        };

        palette.appendChild(btn);
    });
}

/* NAV */
document.getElementById("nextBtn").onclick = ()=>{
    if(index < quizData.length-1){
        index++;
        loadQ();
    }
};

document.getElementById("prevBtn").onclick = ()=>{
    if(index > 0){
        index--;
        loadQ();
    }
};

document.getElementById("reviewBtn").onclick = ()=>{
    review[index] = true;
    updatePalette();
};

/* SUBMIT */
document.getElementById("submitBtn").onclick = ()=>{

    let score = 0;

    quizData.forEach((q,i)=>{
        if(answers[i] === q.a){
            score++;
        }
    });

    result.innerHTML = `
    <h2>Score: ${score}/${quizData.length}</h2>
    `;
};

/* START */
loadQ();

</script>

</body>
</html>
