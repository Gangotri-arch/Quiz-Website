<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TrendWise GK</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f3f4f6;
      transition: 0.3s;
      scroll-behavior: smooth;
    }

    /* DARK MODE */
    body.dark {
      background: #0f172a;
      color: white;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
      text-align: center;
      padding: 25px 15px;
      position: relative;
    }

    header h1 {
      margin: 0;
      font-size: 30px;
    }

    header p {
      margin-top: 5px;
      color: #cbd5e1;
    }

    /* TOP RIGHT BUTTONS (IMPORTANT FIX) */
    .top-buttons {
      position: absolute;
      top: 15px;
      right: 15px;
      display: flex;
      gap: 10px;
    }

    .top-buttons button {
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
    }

    .dark-btn {
      background: #facc15;
      color: black;
    }

    .lang-btn {
      background: #22c55e;
      color: white;
    }

    nav {
      margin-top: 10px;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      font-weight: 500;
    }

    nav a:hover {
      color: #38bdf8;
    }

    /* HOME CARDS */
    .container {
      max-width: 1100px;
      margin: 40px auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 0 20px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      transition: 0.3s;
      text-decoration: none;
      color: black;
    }

    body.dark .card {
      background: #1e293b;
      color: white;
    }

    .card:hover {
      transform: translateY(-8px);
      background: #dbeafe;
    }

    body.dark .card:hover {
      background: #334155;
    }

    .tag {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      background: #dbeafe;
      color: #1d4ed8;
      margin-bottom: 10px;
    }

    /* SECTIONS */
    section {
      max-width: 1000px;
      margin: 25px auto;
      background: white;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    body.dark section {
      background: #1e293b;
    }

    section h2 {
      border-left: 5px solid #3b82f6;
      padding-left: 10px;
    }

    /* QUIZ */
    .quiz-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }

    .quiz-box {
      background: #f9fafb;
      border: 1px solid #ddd;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      transition: 0.3s;
    }

    body.dark .quiz-box {
      background: #0f172a;
      border-color: #334155;
    }

    .quiz-box:hover {
      background: #dbeafe;
      transform: scale(1.05);
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #111827;
      color: white;
      margin-top: 40px;
    }

  </style>
</head>

<body>

<header>
  <h1>TrendWise GK</h1>
  <p>Learn Smarter • Practice Better • Score Higher</p>

  <!-- FIXED BUTTON AREA -->
  <div class="top-buttons">
    <button class="dark-btn" onclick="toggleDark()">🌙 Night</button>
    <button class="lang-btn" onclick="toggleLang()">🌐 Lang</button>
  </div>

  <nav>
    <a href="#current">Current</a>
    <a href="#quiz">Quiz</a>
    <a href="#maths">Maths</a>
    <a href="#reasoning">Reasoning</a>
  </nav>
</header>

<!-- HOME -->
<div class="container">

  <a href="#current" class="card">
    <div class="tag">Daily</div>
    <h2 id="t1">Current Affairs</h2>
  </a>

  <a href="#quiz" class="card">
    <div class="tag">Practice</div>
    <h2 id="t2">Quiz</h2>
  </a>

  <a href="#maths" class="card">
    <div class="tag">Math</div>
    <h2 id="t3">Maths</h2>
  </a>

  <a href="#reasoning" class="card">
    <div class="tag">Logic</div>
    <h2 id="t4">Reasoning</h2>
  </a>

</div>

<!-- SECTIONS -->
<section id="current">
  <h2>Current Affairs</h2>
</section>

<section id="quiz">
  <h2>Quiz</h2>

  <div class="quiz-grid">
    <div class="quiz-box">History</div>
    <div class="quiz-box">Art & Culture</div>
    <div class="quiz-box">Geography</div>
    <div class="quiz-box">Polity & Economics</div>
    <div class="quiz-box">Science</div>
  </div>
</section>

<section id="maths">
  <h2>Maths</h2>
</section>

<section id="reasoning">
  <h2>Reasoning</h2>
</section>

<footer>
  © 2026 TrendWise GK
</footer>

<script>
  function toggleDark() {
    document.body.classList.toggle("dark");
  }

  let english = true;

  function toggleLang() {
    english = !english;

    document.getElementById("t1").innerText = english ? "Current Affairs" : "करंट अफेयर्स";
    document.getElementById("t2").innerText = english ? "Quiz" : "क्विज";
    document.getElementById("t3").innerText = english ? "Maths" : "गणित";
    document.getElementById("t4").innerText = english ? "Reasoning" : "रीजनिंग";
  }
</script>

</body>
</html>
